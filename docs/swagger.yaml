paths:
  /v1/comments:
    post:
      consumes:
      - application/json
      description: Create a new comment
      parameters:
      - description: Data to create new comment
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_hamidgh01_Go-Blog-API_internal_http_dto.CreateCommentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/github_com_hamidgh01_Go-Blog-API_internal_http_helpers.standardResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_hamidgh01_Go-Blog-API_internal_http_dto.CommentDetails'
                details:
                  type: object
              type: object
        "400":
          description: validation error
        "422":
          description: invalid json format or json fields with invalid value type
        "500":
          description: internal server error
      security:
      - BearerAuth: []
      summary: Create Comment
      tags:
      - comments
  /v1/comments/{id}:
    delete:
      description: Delete a comment (**only admin access**)
      parameters:
      - description: Unique Comment ID
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "202":
          description: Success
        "400":
          description: invalid path parameter
        "404":
          description: comment not found
        "500":
          description: internal server error
      security:
      - BearerAuth: []
      summary: Delete Comment
      tags:
      - comments
    get:
      description: Get a comment by unique id
      parameters:
      - description: Unique Comment ID
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/github_com_hamidgh01_Go-Blog-API_internal_http_helpers.standardResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_hamidgh01_Go-Blog-API_internal_http_dto.CommentDetails'
                details:
                  type: object
              type: object
        "400":
          description: invalid path parameter
        "404":
          description: comment not found
        "500":
          description: internal server error
      security:
      - BearerAuth: []
      summary: Get Comment By ID
      tags:
      - comments
    put:
      consumes:
      - application/json
      description: Update a comment
      parameters:
      - description: Unique Comment ID
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      - description: Data to update a comment
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_hamidgh01_Go-Blog-API_internal_http_dto.UpdateCommentRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Success
        "400":
          description: validation error | invalid path parameter
        "404":
          description: comment not found
        "422":
          description: invalid json format or json fields with invalid value type
        "500":
          description: internal server error
      security:
      - BearerAuth: []
      summary: Update Comment
      tags:
      - comments
  /v1/comments/{id}/delete:
    patch:
      description: Delete a comment at user request (change status to "deleted")
      parameters:
      - description: Unique Comment ID
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "202":
          description: Success
        "400":
          description: invalid path parameter
        "404":
          description: comment not found
        "500":
          description: internal server error
      security:
      - BearerAuth: []
      summary: Delete Comment At User Request
      tags:
      - comments
  /v1/comments/{id}/hide:
    patch:
      description: Hide a comment (change status to "hidden") (**only admin access**)
      parameters:
      - description: Unique Comment ID
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "202":
          description: Success
        "400":
          description: invalid path parameter
        "404":
          description: comment not found
        "500":
          description: internal server error
      security:
      - BearerAuth: []
      summary: Hide Comment
      tags:
      - comments
  /v1/comments/{id}/replies:
    get:
      description: Get a list of comment's replies with pagination
      parameters:
      - description: Unique Comment ID to use as FK
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      - default: 1
        description: 'Page Number (default: 1)'
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 10
        description: 'Items per Page (default: 10)'
        in: query
        maximum: 100
        minimum: 1
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/github_com_hamidgh01_Go-Blog-API_internal_http_helpers.standardResponse'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/github_com_hamidgh01_Go-Blog-API_internal_http_generics.PagedList-github_com_hamidgh01_Go-Blog-API_internal_http_dto_CommentList'
                  - properties:
                      items:
                        items:
                          $ref: '#/definitions/github_com_hamidgh01_Go-Blog-API_internal_http_dto.CommentDetails'
                        type: array
                    type: object
                details:
                  type: object
              type: object
        "400":
          description: invalid path parameter | invalid query parameters (for 'size'
            or 'page')
        "404":
          description: there's no any reply for this comment
        "500":
          description: internal server error
      security:
      - BearerAuth: []
      summary: Get Comment's Replies
      tags:
      - comments
  /v1/comments/{id}/republish:
    patch:
      description: Republish a comment (change status to "published") (**only admin
        access**)
      parameters:
      - description: Unique Comment ID
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "202":
          description: Success
        "400":
          description: invalid path parameter
        "404":
          description: comment not found
        "500":
          description: internal server error
      security:
      - BearerAuth: []
      summary: Republish Comment
      tags:
      - comments
  /v1/links:
