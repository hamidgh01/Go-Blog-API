Server:
  host: 127.0.0.1
  port: 8000

Logger:
  level: info # options: 'debug', 'info', 'warning', 'error', 'fatal' (default: 'info')
  outputFile: # path to the log file. e.g. `./app.log` (default: os.Stdout (if leave empty))

Postgres:
  host: localhost
  port: 5432
  user: your_username
  password: your_password
  dbName: your_db_name
  sslMode: disable
  maxIdleConns: 15
  maxOpenConns: 100
  connMaxLifetime: 5
  timezone: Asia/Tehran

redis:
  host: localhost
  port: 6379
  password: # enter your redis password if it's required based on your redis-server configurations
  db: 0

Jwt:
  accessSecret: Add-Secret-Key-For-Access-Token
  refreshSecret: Add-Secret-Key-For-Refresh-Token
  accessTokenExpirationMinutes: 15 # minutes
  refreshTokenExpirationDays: 7 # days
